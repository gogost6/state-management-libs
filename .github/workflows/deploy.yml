name: Deploy React App

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Check if secrets exist
        run: |
          [ -n "${{ secrets.VPS_HOST }}" ] && echo "VPS_HOST exists" || echo "VPS_HOST missing"
          [ -n "${{ secrets.VPS_USER }}" ] && echo "VPS_USER exists" || echo "VPS_USER missing"
          [ -n "${{ secrets.VPS_SSH_KEY }}" ] && echo "VPS_SSH_KEY exists" || echo "VPS_SSH_KEY missing"
          [ -n "${{ secrets.GHCR_USERNAME }}" ] && echo "GHCR_USERNAME exists" || echo "GHCR_USERNAME missing"
          [ -n "${{ secrets.GHCR_PAT }}" ] && echo "GHCR_PAT exists" || echo "GHCR_PAT missing"

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} -p ${{ secrets.GHCR_PAT }}
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop react-app || true
            docker rm react-app || true
            docker run -d --name react-app --restart unless-stopped -p 80:80 ghcr.io/${{ github.repository }}:latest
          EOF
